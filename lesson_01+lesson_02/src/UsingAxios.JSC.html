<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <title>ניהול עובדים</title>
    <style>
        body {
           
            background: #f4f6f9;
            padding: 30px;
        }
        .form-box {
            background: white;
            padding: 20px;
            width: 300px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .form-box input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="form-box">
    <input type="number" id="empId" placeholder="ID"><br>
    <input type="text" id="name" placeholder="שם"><br>
    <input type="text" id="position" placeholder="תפקיד"><br>

    <div class="buttons">
        <button onclick="Post()">הוסף עובד</button>
        <button onclick="Put()">עדכן עובד</button>
        <button onclick="Delete()">מחק עובד</button>
        <button onclick="Get()">טען עובדים</button>
    </div>
</div>

<div id="result"></div>

<script>
    function Post() {
        const name = document.getElementById("name").value;
        const position = document.getElementById("position").value;

        const employee={name, position};

        axios.post('https://localhost:7062/api/Employees', employee)
            .then(() => {
                document.getElementById("result").innerText = "ההוספה בוצעה בהצלחה";
            })
            .catch(error => {
                console.error("שגיאה בהוספה:", error);
                alert("שגיאה בהוספה");
            });
    }

    function Delete() {
        const id = document.getElementById("empId").value;
        if (!id) {
            alert("נא להזין ID למחיקה");
            return;
        }

        axios.delete(`https://localhost:7062/api/Employees/${id}`)
            .then(() => {
                document.getElementById("result").innerText = "המחיקה בוצעה בהצלחה";
            })
            .catch(error => {
                console.error("שגיאה במחיקה:", error);
                alert("שגיאה במחיקה");
            });
    }

    function Put() {
        const id = document.getElementById("empId").value;
        const name = document.getElementById("name").value;
        const position = document.getElementById("position").value;
        
        if (!id) {
            alert("נא להזין ID לעדכון");
            return;
        }
        if (!name || !position) {
            alert("נא למלא שם ותפקיד");
            return;
        }

        const employee = { id, name, position };

        axios.put(`https://localhost:7062/api/Employees/${id}`, employee)
            .then(() => {
                document.getElementById("result").innerText = "העדכון בוצע בהצלחה";
            })
            .catch(error => {
                console.error("שגיאה בעדכון:", error);
                alert("שגיאה בעדכון");
            });
    }

    function Get() {
        axios.get('https://localhost:7062/api/Employees')
            .then(response => {
                const employees = response.data;
                if (!employees.length) {
                    document.getElementById("result").innerText = "אין עובדים ברשימה";
                    return;
                }

                let html = "<h3>רשימת עובדים:</h3><ul>";
                employees.forEach(emp => {
                    html += `<li>ID: ${emp.id}, Name: ${emp.name}, Position: ${emp.position}</li>`;
                });
                html += "</ul>";

                document.getElementById("result").innerHTML = html;
            })
            .catch(error => {
                console.error("שגיאה בקבלת נתונים:", error);
                alert("שגיאה בקבלת נתונים");
            });
    }
</script>

</body>
</html>
